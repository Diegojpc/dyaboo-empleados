services:

  # ──────────────────────────────────────────────
  # PostgreSQL 16 – Base de datos relacional
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dyaboo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-dyaboo_db}
      POSTGRES_USER:     ${POSTGRES_USER:-dyaboo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dyaboo_secret}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - dyaboo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dyaboo_user} -d ${POSTGRES_DB:-dyaboo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────
  # MinIO – Object storage S3-compatible
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dyaboo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-dyaboo_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dyaboo_minio_secret}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API  → acceso desde el navegador
      - "9001:9001"   # Console → http://localhost:9001
    networks:
      - dyaboo-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────
  # .NET 8 WebAPI – Backend (Clean Architecture)
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    container_name: dyaboo-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS:        http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-dyaboo_db};
        Username=${POSTGRES_USER:-dyaboo_user};
        Password=${POSTGRES_PASSWORD:-dyaboo_secret};
        Pooling=true;MinPoolSize=5;MaxPoolSize=100;
        Connection Idle Lifetime=300;
      Minio__Endpoint:  minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER:-dyaboo_minio}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD:-dyaboo_minio_secret}
      Minio__Bucket:    dyaboo-assets
      Minio__PublicUrl: http://localhost:9000
      Minio__UseSSL:    "false"
      Jwt__Key:         ${JWT_SECRET_KEY:-dyaboo-dev-local-insecure-change-before-production!!}
      Jwt__Issuer:      ${JWT_ISSUER:-dyaboo-api}
      Jwt__Audience:    ${JWT_AUDIENCE:-dyaboo-frontend}
      Cors__AllowedOrigins__0: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - dyaboo-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────
  # Next.js 15 – Frontend (App Router + TypeScript)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: dyaboo-frontend
    restart: unless-stopped
    environment:
      NODE_ENV:                production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL:     http://localhost:8080
      NEXT_PUBLIC_MINIO_URL:   http://localhost:9000
      API_INTERNAL_URL:        http://api:8080
    ports:
      - "3000:3000"
    networks:
      - dyaboo-net
    depends_on:
      api:
        condition: service_healthy

# ──────────────────────────────────────────────
# Volúmenes persistentes
# ──────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  minio-data:
    driver: local

# ──────────────────────────────────────────────
# Red interna aislada
# ──────────────────────────────────────────────
networks:
  dyaboo-net:
    driver: bridge
    name: dyaboo-network
