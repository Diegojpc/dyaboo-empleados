<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dyaboo ERP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #108474;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      user-select: none;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.15);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -2px;
    }
    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    p  { font-size: 14px; opacity: 0.7; margin-bottom: 40px; }
    .dots { display: flex; gap: 8px; }
    .dot {
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { background: rgba(255,255,255,0.3); transform: scale(1); }
      40%            { background: rgba(255,255,255,0.9); transform: scale(1.3); }
    }
    .status { margin-top: 24px; font-size: 12px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="logo">D</div>
  <h1>Dyaboo ERP</h1>
  <p>Sistema de Gestión Empresarial</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <p class="status">Conectando al servidor...</p>
</body>
</html>
