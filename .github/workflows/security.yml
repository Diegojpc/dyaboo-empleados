name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  # ─────────────────────────────────────────────
  # 1. Secret scanning — Gitleaks
  # ─────────────────────────────────────────────
  secrets:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for comprehensive scan

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 2. SAST — CodeQL (C#)
  # ─────────────────────────────────────────────
  codeql-csharp:
    name: SAST C# (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Build backend
        run: dotnet build backend/Dyaboo.sln --configuration Release
        env:
          JWT_SECRET_KEY: ci-build-only-not-a-real-secret-placeholder

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # ─────────────────────────────────────────────
  # 3. SAST — CodeQL (TypeScript)
  # ─────────────────────────────────────────────
  codeql-typescript:
    name: SAST TypeScript (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (for analysis)
        working-directory: frontend
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_MINIO_URL: http://localhost:9000
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ─────────────────────────────────────────────
  # 4. SCA — Trivy (NuGet + npm dependencies)
  # ─────────────────────────────────────────────
  trivy-deps:
    name: SCA — Dependencies (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy — backend NuGet
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/
          scanners: vuln
          severity: CRITICAL       # only block on CRITICAL; HIGH reported but not blocking
          exit-code: '1'
          format: table

      - name: Trivy — frontend npm
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: frontend/
          scanners: vuln
          severity: CRITICAL
          exit-code: '1'
          format: table

  # ─────────────────────────────────────────────
  # 5. Container scanning — Trivy (Docker images)
  # ─────────────────────────────────────────────
  trivy-containers:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t dyaboo-api:scan ./backend

      - name: Trivy — API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dyaboo-api:scan
          scanners: vuln,secret,misconfig
          severity: CRITICAL
          exit-code: '1'
          vuln-type: library     # skip OS-level CVEs (base image, not our code)
          format: sarif
          output: trivy-api.sarif

      - name: Upload API results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Build Frontend image
        run: docker build -t dyaboo-fe:scan ./frontend

      - name: Trivy — Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dyaboo-fe:scan
          scanners: vuln,secret,misconfig
          severity: CRITICAL
          exit-code: '1'
          vuln-type: library
          format: sarif
          output: trivy-fe.sarif

      - name: Upload Frontend results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fe.sarif
          category: trivy-frontend
